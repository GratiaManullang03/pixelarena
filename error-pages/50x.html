<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="15">
<title>ARENA OFFLINE · PIXEL ARENA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800;900&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c1210; --ink:#efe6d1; --dim:#9a9079; --label:#b8ad93;
    --accent:#ffc04a; --accent-deep:#d89b2a; --amber:#ffc04a; --line:#0a0908;
    --panel:#1a1815; --panel-2:#252220; --metal:#48463f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(circle at 50% 30%, #15211d 0%, var(--bg) 70%);
    color:var(--ink); font-family:'Barlow Condensed',system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100vh;
    padding:24px; overflow:hidden; position:relative;
  }
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:9;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;
  }
  .frame{
    width:100%; max-width:560px; text-align:center; position:relative; z-index:1;
    background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border:2px solid var(--metal); border-radius:14px;
    box-shadow:0 0 0 4px var(--line), 0 24px 60px rgba(0,0,0,.6);
    padding:40px 32px 36px;
  }
  .tag{
    font-size:14px; letter-spacing:.32em; text-transform:uppercase;
    color:var(--label); font-weight:700; margin-bottom:6px;
  }
  .code{
    font-family:'VT323',monospace; font-size:96px; line-height:.9;
    color:var(--accent); text-shadow:0 0 18px rgba(255,192,74,.5), 0 0 2px #fff;
    margin:6px 0 8px; animation:flicker 4.5s infinite steps(1);
  }
  @keyframes flicker{
    0%,96%,100%{opacity:1} 97%{opacity:.4} 98%{opacity:.9} 99%{opacity:.5}
  }
  h1{
    font-weight:900; font-size:30px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--ink); margin-bottom:10px;
  }
  p{ color:var(--dim); font-size:18px; line-height:1.45; max-width:42ch; margin:0 auto 26px; }
  .btn{
    display:inline-block; text-decoration:none; cursor:pointer;
    font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:18px;
    letter-spacing:.12em; text-transform:uppercase; color:#120a08;
    background:linear-gradient(180deg, var(--amber) 0%, #d89b2a 100%);
    border:none; border-radius:8px; padding:13px 30px;
    box-shadow:0 4px 0 #8a6418, 0 8px 18px rgba(0,0,0,.4);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #8a6418; }
  .dots:after{ content:""; animation:dots 1.4s steps(4,end) infinite; }
  @keyframes dots{ 0%{content:""} 25%{content:"."} 50%{content:".."} 75%{content:"..."} 100%{content:""} }
  .meta{ margin-top:22px; font-family:'VT323',monospace; font-size:16px; color:var(--metal); letter-spacing:.08em; }
</style>
</head>
<body>
  <main class="frame">
    <div class="tag">// Pixel Arena</div>
    <div class="code">OFFLINE</div>
    <h1>Arena Is Rebooting</h1>
    <p>The server is temporarily down for maintenance or restarting. Reconnecting automatically<span class="dots"></span></p>
    <a class="btn" href="/">Retry Now</a>
    <div class="meta">ERR_UPSTREAM_UNAVAILABLE · auto-retry 15s</div>
  </main>
</body>
</html>
